name: moto_gps
description: Aplicación de navegación inteligente para motociclistas con zoom dinámico.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mapbox_maps_flutter: ^2.0.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2   # ✅ AGREGA
  url_launcher: ^6.2.5         # ✅ AGREGA
  http: ^1.2.0                 # ✅ AGREGA
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ✅ SECCIÓN AGREGADA - Assets del proyecto
  assets:
    - assets/moto_pin.png
    - assets/moto.png        # ✅ AGREGA ESTA LÍNEA
