name: moto_gps
description: Aplicación de navegación inteligente para motociclistas con zoom dinámico.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mapbox_maps_flutter: ^2.0.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  cupertino_icons: ^1.0.6
  flutter_tts: ^3.8.5
  image_picker: ^1.1.2
  flutter_riverpod: ^2.6.1
  wakelock_plus: ^1.2.8
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/moto_pin.png
