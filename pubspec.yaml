name: motogps
description: Aplicación GPS para viajes en motocicleta

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.1.0

  # Mapas — OpenStreetMap sin costo
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Caché offline de tiles
  flutter_map_tile_caching: ^9.1.4

  # GPS y Localización
  geolocator: ^13.0.2

  # Background tracking — CRÍTICO para moto
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2

  # Permisos
  permission_handler: ^11.3.1

  # Text-to-Speech — navegación por voz
  flutter_tts: ^4.0.2

  # Conectividad
  connectivity_plus: ^6.0.3

  # Base de datos local (rutas y waypoints)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
