plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def mapboxToken = localProperties['MAPBOX_TOKEN'] ?: System.getenv('MAPBOX_TOKEN') ?: ''

android {
    namespace "com.coyoteatento.motogps"
    compileSdk 35
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled false
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    defaultConfig {
        applicationId "com.coyoteatento.motogps"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode Integer.parseInt(System.getenv("VERSION_CODE") ?: "1")
        versionName (System.getenv("VERSION_NAME") ?: "1.0.0")
        multiDexEnabled true
        manifestPlaceholders = [
            MAPBOX_TOKEN: mapboxToken,
            applicationName: "io.flutter.app.FlutterApplication"
        ]
    }
    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "motogps-release.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias System.getenv("KEY_ALIAS") ?: ""
            keyPassword System.getenv("KEY_PASSWORD") ?: ""
        }
    }
    buildTypes {
        release {
            shrinkResources false
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'com.google.android.gms:play-services-location:21.3.0'
}
