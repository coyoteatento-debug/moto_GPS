name: Moto GPS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Configure Mapbox token
        run: |
          mkdir -p ~/.gradle
          echo "MAPBOX_DOWNLOADS_TOKEN=${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}" >> ~/.gradle/gradle.properties
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "flutter.sdk=$FLUTTER_SDK" >> android/local.properties

      - name: Generate settings.gradle    # ✅ NUEVO — genera el archivo con rutas correctas
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          cat > android/settings.gradle << EOF
          pluginManagement {
              includeBuild("$FLUTTER_SDK/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          EOF

      - name: Fix AndroidX
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Delete auto-generated files
        run: |
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
