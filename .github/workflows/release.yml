name: Moto GPS Build Release v3

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # ✅ v3 → v4

      - name: Setup Java
        uses: actions/setup-java@v4      # ✅ v3 → v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Configure local.properties
        run: |
          mkdir -p ~/.gradle
          echo "MAPBOX_DOWNLOADS_TOKEN=${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}" >> android/local.properties

      - name: Fix AndroidX
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=false" >> android/gradle.properties

      - name: Clean Gradle cache
        run: |
          rm -rf ~/.gradle/caches/transforms-3
          rm -rf ~/.gradle/caches/modules-2

      - name: Delete auto-generated files
        run: |
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Clean Gradle
        run: |
          flutter clean
          cd android && ./gradlew clean --no-daemon || true
          cd ..
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\r\n' | grep -v "CERTIFICATE" | base64 --decode > android/app/motogps-release.jks

      - name: Build AAB Release
        run: flutter build appbundle --release --dart-define=MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          JAVA_TOOL_OPTIONS: "-Xmx4g"
          KEYSTORE_PATH: motogps-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4  # ✅ ya estaba en v4
        with:
          name: release-apk
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Build APK Debug
        run: flutter build apk --debug --dart-define=MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk    
