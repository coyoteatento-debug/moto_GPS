name: MotoGPS CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  validate:
    name: Analisis y Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Generar codigo Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analizar codigo
        run: flutter analyze --no-fatal-infos

      - name: Ejecutar tests
        run: flutter test

  build_debug:
    name: Build APK Debug
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    if: github.event_name == 'push'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cachear pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Cachear Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Instalar dependencias
        run: flutter pub get

      - name: Generar codigo Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK Debug
        run: flutter build apk --debug

      - name: Subir APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build_release:
    name: Build Release APK y AAB
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cachear pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Cachear Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Instalar dependencias
        run: flutter pub get

      - name: Generar codigo Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decodificar Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Crear key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build APK Release
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Build AAB Release
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info

      - name: Subir APK Release
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Subir AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: aab-release-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Limpiar keystore
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/key.properties
```
