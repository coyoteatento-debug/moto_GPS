# ══════════════════════════════════════════════════════════════
# PR Check — Validación rápida en Pull Requests
# Más liviano que el pipeline completo
# ══════════════════════════════════════════════════════════════
name: PR Check

on:
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  pr_check:
    name: ✅ Validar PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 pub get
        run: flutter pub get

      - name: 🔧 build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔍 analyze
        run: flutter analyze --no-fatal-infos

      - name: 🧪 test
        run: flutter test

      # Comentar en el PR con el resultado
      - name: 💬 Comentar resultado en PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const msg = status === 'success'
              ? '**Análisis y tests pasaron correctamente.**'
              : '**Falló el análisis o los tests. Revisa los logs.**';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **PR Check ${status.toUpperCase()}**\n\n${msg}`
            });
